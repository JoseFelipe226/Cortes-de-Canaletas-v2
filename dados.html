<html lang="pt-PT" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de Dados - Cortes</title>
    
    <!-- Favicon Embutido (Ícone da Aba) -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjM2I4MmY2IiBzdHJva2Utd2lkdGg9IjIiIHN0cm9rZS1saW5lY2FwPSJyb3VuZCIgc3Ryb2tlLWxpbmVqb2luPSJyb3VuZCI+PGNpcmNsZSBjeD0iNiIgY3k9IjYiIHI9IjMiLz48Y2lyY2xlIGN4PSI2IiBjeT0iMTgiIHI9IjMiLz48bGluZSB4MT0iMjAiIHkxPSI0IiB4Mj0iOC4xMiIgeTI9IjE1Ljg4Ii8+PGxpbmUgeDE9IjE0LjQ3IiB5MT0iMTQuNDgiIHgyPSIyMCIgeTI9IjIwIi8+PGxpbmUgeDE9IjguMTIiIHkxPSI4LjEyIiB4Mj0iMTIiIHkyPSIxMiIvPjwvc3ZnPg==">
    
    <!-- Tailwind CSS (via CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class', // Ativa o modo escuro baseado em classe
        }
    </script>
    
    <!-- React & ReactDOM (via CDN) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (para compilar JSX no navegador) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- xlsx-js-style (Biblioteca avançada para gerar Excel) -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        /* Light mode scrollbar */
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        /* Dark mode scrollbar */
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #64748b; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-200 transition-colors duration-300">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // Ícones embutidos nativamente
        const Icons = {
            'settings-2': (className) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 7h-9"/><path d="M14 17H5"/><circle cx="17" cy="7" r="3"/><circle cx="8" cy="17" r="3"/></svg>,
            'ruler': (className) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21.3 15.3l-7.6-7.6C12.5 6.5 10.5 6 9 7L4 12c-1.5 1.5-1 3.5.2 4.7l7.6 7.6c1.2 1.2 3.2 1.7 4.7.2l5-5c1.5-1.5 2-3.5.8-4.7Z"/><path d="M14.5 12.5l-2-2"/><path d="M11.5 9.5l-2-2"/><path d="M8.5 6.5l-2-2"/><path d="M17.5 15.5l-2-2"/></svg>,
            'tag': (className) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2H2v10l9.29 9.29c.94.94 2.48.94 3.42 0l6.58-6.58c.94-.94.94-2.48 0-3.42L12 2Z"/><path d="M7 7h.01"/></svg>,
            'alert-circle': (className) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>,
            'plus': (className) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
            'trash-2': (className) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>,
            'bar-chart': (className) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>,
            'scissors': (className) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><line x1="20" y1="4" x2="8.12" y2="15.88"/><line x1="14.47" y1="14.48" x2="20" y2="20"/><line x1="8.12" y1="8.12" x2="12" y2="12"/></svg>,
            'excel': (className) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M8 13h2"/><path d="M8 17h2"/><path d="M14 13h2"/><path d="M14 17h2"/></svg>,
            'file-text': (className) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>,
            'external-link': (className) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>,
            'upload-cloud': (className) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/><polyline points="16 16 12 12 8 16"/></svg>,
            'download': (className) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
            'calculator': (className) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="16" y1="14" x2="16" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></svg>,
            'sun': (className) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>,
            'moon': (className) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
        };

        const Icon = ({ name, className }) => {
            const renderIcon = Icons[name];
            return renderIcon ? renderIcon(className) : null;
        };

        const FIXED_PROFILES = [
            "HDP2 30X30", "HDP3 30X50", "HDP4 50X50", "HDP5 80X50",
            "HDP6 110X50", "HDP7 150X50", "HDP8 30X80", "HDP9 50X80",
            "HDP10 80X80", "HDP11 60X50", "HDP12 110X80", "HDP14 40X70",
            "HDP15 70X70", "HDP16 40X60", "Trilho de Cobre 7,5",
            "Trilho de Cobre 15", "Trilho Galvanizado 7,5", "Trilho Galvanizado 15"
        ];

        function App() {
            // --- CONTROLE DE TEMA ---
            const [isDark, setIsDark] = useState(() => {
                const saved = localStorage.getItem('theme');
                return saved !== 'light'; 
            });

            useEffect(() => {
                if (isDark) {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('theme', 'dark');
                } else {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('theme', 'light');
                }
            }, [isDark]);

            // Inicializar estados a partir do localStorage usando chaves específicas para esta página
            const [planName, setPlanName] = useState(() => {
                const saved = localStorage.getItem('dados_planName');
                return saved !== null ? saved : 'Dados de Corte';
            });

            const [standardLength, setStandardLength] = useState(() => {
                const saved = localStorage.getItem('dados_standardLength');
                return saved !== null ? Number(saved) : 2000;
            });

            const [bladeWidth, setBladeWidth] = useState(() => {
                const saved = localStorage.getItem('dados_bladeWidth');
                return saved !== null ? Number(saved) : 0;
            });

            const [cutList, setCutList] = useState(() => {
                const saved = localStorage.getItem('dados_cutList');
                return saved ? JSON.parse(saved) : [];
            });

            const [results, setResults] = useState(() => {
                const saved = localStorage.getItem('dados_results');
                return saved ? JSON.parse(saved) : null;
            });

            // Estado dos inputs
            const [currentProfile, setCurrentProfile] = useState(FIXED_PROFILES[0]);
            const [currentLength, setCurrentLength] = useState('');
            const [error, setError] = useState('');

            // Salvar automaticamente sempre que os dados mudarem
            useEffect(() => { localStorage.setItem('dados_planName', planName); }, [planName]);
            useEffect(() => { localStorage.setItem('dados_standardLength', standardLength); }, [standardLength]);
            useEffect(() => { localStorage.setItem('dados_bladeWidth', bladeWidth); }, [bladeWidth]);
            useEffect(() => { localStorage.setItem('dados_cutList', JSON.stringify(cutList)); }, [cutList]);
            useEffect(() => {
                if (results) localStorage.setItem('dados_results', JSON.stringify(results));
                else localStorage.removeItem('dados_results');
            }, [results]);

            const handleAddCut = (e) => {
                e.preventDefault();
                setError('');

                const length = parseFloat(currentLength);

                if (isNaN(length) || length <= 0) {
                    setError('O tamanho da peça deve ser maior que zero.');
                    return;
                }
                if (length > standardLength) {
                    setError(`O tamanho não pode ser maior que a barra original (${standardLength}mm).`);
                    return;
                }

                const profileName = currentProfile;

                const newItem = {
                    id: Math.random().toString(36).substr(2, 9),
                    length,
                    quantity: 1, 
                    profile: profileName
                };

                setCutList([...cutList, newItem]);
                setCurrentLength('');
                setResults(null);
            };

            const handleRemoveCut = (id) => {
                setCutList(cutList.filter(item => item.id !== id));
                setResults(null);
            };

            // --- IMPORTAÇÃO EXCEL ---
            const downloadTemplate = () => {
                const wb = XLSX.utils.book_new();
                const wsData = [
                    ["Modelo da Canaleta", "Tamanho (mm)"]
                ];
                
                // Adiciona todos os perfis (canaletas e trilhos) com tamanhos de exemplo
                FIXED_PROFILES.forEach((profile, index) => {
                    const dummySize = 500 + (index * 50);
                    wsData.push([profile, dummySize]);
                });
                
                const ws = XLSX.utils.aoa_to_sheet(wsData);
                ws['!cols'] = [{ wch: 30 }, { wch: 15 }];
                
                XLSX.utils.book_append_sheet(wb, ws, "Dados");
                XLSX.writeFile(wb, "Modelo_Importacao.xlsx");
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const bstr = evt.target.result;
                        const wb = XLSX.read(bstr, { type: 'binary' });
                        const wsname = wb.SheetNames[0];
                        const ws = wb.Sheets[wsname];
                        
                        const data = XLSX.utils.sheet_to_json(ws, { header: 1 });
                        const newItems = [];
                        
                        for (let i = 1; i < data.length; i++) {
                            const row = data[i];
                            if (row && row.length >= 2) {
                                const profileName = String(row[0]).trim();
                                const length = parseFloat(row[1]);

                                if (profileName && !isNaN(length) && length > 0) {
                                    newItems.push({
                                        id: Math.random().toString(36).substr(2, 9),
                                        length: length,
                                        quantity: 1, 
                                        profile: profileName
                                    });
                                }
                            }
                        }

                        if (newItems.length > 0) {
                            setCutList(prev => [...prev, ...newItems]);
                            setResults(null);
                            setError('');
                        } else {
                            setError('Nenhum dado válido encontrado. Verifique a planilha.');
                        }
                    } catch (error) {
                        console.error("Erro ao ler arquivo", error);
                        setError("Erro ao ler o arquivo Excel. Formato inválido.");
                    }
                    e.target.value = null; // Resetar
                };
                reader.readAsBinaryString(file);
            };

            // NOVA LÓGICA: Sem otimização. Adiciona estritamente na ordem digitada.
            const generateVisualization = () => {
                if (cutList.length === 0) return;

                let groupedCuts = {};
                
                cutList.forEach(item => {
                    if (!groupedCuts[item.profile]) groupedCuts[item.profile] = [];
                    for (let i = 0; i < item.quantity; i++) {
                        groupedCuts[item.profile].push(item.length);
                    }
                });

                let allBins = [];
                let blade = parseFloat(bladeWidth) || 0;

                for (const [profile, cuts] of Object.entries(groupedCuts)) {
                    let bins = [];
                    let currentBin = { id: 1, profile: profile, cuts: [], remaining: standardLength };

                    cuts.forEach(cut => {
                        const spaceNeeded = currentBin.cuts.length > 0 ? cut + blade : cut;
                        
                        if (currentBin.remaining >= spaceNeeded) {
                            currentBin.cuts.push(cut);
                            currentBin.remaining -= spaceNeeded;
                        } else {
                            if (currentBin.cuts.length > 0) {
                                bins.push(currentBin);
                            }
                            currentBin = { 
                                id: bins.length + 1, 
                                profile: profile, 
                                cuts: [cut], 
                                remaining: standardLength - cut 
                            };
                        }
                    });
                    
                    if (currentBin.cuts.length > 0) {
                        bins.push(currentBin);
                    }
                    
                    allBins = [...allBins, ...bins];
                }
                setResults(allBins);
            };

            const clearAll = () => {
                if(window.confirm("Tem a certeza que deseja limpar toda a lista?")) {
                    setCutList([]);
                    setResults(null);
                    setError('');
                }
            };

            const exportToExcelGraphic = () => {
                if (!results) return;

                const wb = XLSX.utils.book_new();
                const aoa = [];
                const merges = [];
                let rowIndex = 0;

                const cutColors = ["2563EB", "4F46E5", "0891B2", "0284C7"];
                const wasteColor = "E2E8F0"; 
                
                const displayPlanName = planName.trim() || "Visualização de Dados";
                aoa.push([{ 
                    v: displayPlanName, 
                    s: { 
                        font: { bold: true, sz: 18, color: { rgb: "FFFFFF" } }, 
                        fill: { fgColor: { rgb: "0F172A" } }, 
                        alignment: { horizontal: "center", vertical: "center" } 
                    } 
                }]);
                merges.push({ s: { r: rowIndex, c: 0 }, e: { r: rowIndex, c: 100 } });
                rowIndex++;
                
                aoa.push(new Array(101).fill(""));
                rowIndex++;

                const grouped = results.reduce((acc, bin) => {
                    if (!acc[bin.profile]) acc[bin.profile] = [];
                    acc[bin.profile].push(bin);
                    return acc;
                }, {});

                for (const [profile, bins] of Object.entries(grouped)) {
                    aoa.push([{ 
                        v: `Modelo: ${profile} (${bins.length} barras)`, 
                        s: { font: { bold: true, sz: 14, color: { rgb: "1E293B" } }, fill: { fgColor: { rgb: "F1F5F9" } }, alignment: { vertical: "center" } } 
                    }]);
                    merges.push({ s: { r: rowIndex, c: 0 }, e: { r: rowIndex, c: 100 } });
                    rowIndex++;

                    bins.forEach(bin => {
                        const row = new Array(101).fill("");
                        row[0] = { v: `Barra #${bin.id}`, s: { font: { bold: true }, alignment: { vertical: "center" } } };

                        let currentPct = 0;
                        
                        bin.cuts.forEach((cut, cutIdx) => {
                            let pct = Math.round((cut / standardLength) * 100);
                            if (pct === 0 && cut > 0) pct = 1; 
                            if (currentPct + pct > 100) pct = 100 - currentPct; 
                            
                            if (pct > 0) {
                                const colStart = 1 + currentPct;
                                const colEnd = colStart + pct - 1;
                                const bgColor = cutColors[cutIdx % cutColors.length];

                                row[colStart] = {
                                    v: `${cut}mm`,
                                    s: {
                                        fill: { fgColor: { rgb: bgColor } },
                                        font: { color: { rgb: "FFFFFF" }, bold: true, sz: 11 },
                                        alignment: { horizontal: "center", vertical: "center" }
                                    }
                                };

                                if (colStart !== colEnd) {
                                    merges.push({ s: { r: rowIndex, c: colStart }, e: { r: rowIndex, c: colEnd } });
                                }

                                for (let i = colStart + 1; i <= colEnd; i++) {
                                    row[i] = { v: "", s: { fill: { fgColor: { rgb: bgColor } } } };
                                }

                                currentPct += pct;
                            }
                        });

                        const wastePct = 100 - currentPct;
                        if (wastePct > 0) {
                            const colStart = 1 + currentPct;
                            const colEnd = colStart + wastePct - 1;

                            row[colStart] = {
                                v: `Sobra: ${bin.remaining.toFixed(1)}mm`,
                                s: {
                                    fill: { fgColor: { rgb: wasteColor } },
                                    font: { color: { rgb: "64748B" }, italic: true, sz: 11 },
                                    alignment: { horizontal: "center", vertical: "center" }
                                }
                            };

                            if (colStart !== colEnd) {
                                merges.push({ s: { r: rowIndex, c: colStart }, e: { r: rowIndex, c: colEnd } });
                            }
                            
                            for (let i = colStart + 1; i <= colEnd; i++) {
                                row[i] = { v: "", s: { fill: { fgColor: { rgb: wasteColor } } } };
                            }
                        }

                        aoa.push(row);
                        rowIndex++;
                        
                        aoa.push(new Array(101).fill(""));
                        rowIndex++;
                    });
                    
                    aoa.push(new Array(101).fill(""));
                    rowIndex++;
                }

                const ws = XLSX.utils.aoa_to_sheet(aoa);
                ws['!merges'] = merges;
                
                const cols = [{ wch: 15 }];
                for(let i=0; i<100; i++) {
                    cols.push({ wch: 1.5 });
                }
                ws['!cols'] = cols;

                XLSX.utils.book_append_sheet(wb, ws, "Dados Gráficos");

                const dateAtual = new Date().toISOString().split('T')[0];
                const safeFileName = displayPlanName.replace(/[^a-z0-9]/gi, '_');
                XLSX.writeFile(wb, `${safeFileName}_${dateAtual}.xlsx`);
            };

            const stats = useMemo(() => {
                if (!results) return null;
                const totalBars = results.length;
                const totalMaterial = totalBars * standardLength;
                const totalUsed = results.reduce((acc, bin) => acc + (standardLength - bin.remaining), 0);
                const totalWaste = results.reduce((acc, bin) => acc + bin.remaining, 0);
                const efficiency = ((totalUsed / totalMaterial) * 100).toFixed(1);
                return { totalBars, totalWaste, efficiency };
            }, [results, standardLength]);

            const wasteBgUrl = isDark
                ? "url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDAiIGhlaWdodD0iNDAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGcgc3Ryb2tlPSIjMzM0MTU1IiBzdHJva2Utd2lkdGg9IjIiIGZpbGw9Im5vbmUiPjxwYXRoIGQ9Ik0wIDQwbDQwLTQwTTAgODBMODAgME00MCA4MGw0MC00MCIvPjwvZz48L3N2Zz4=')"
                : "url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDAiIGhlaWdodD0iNDAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGcgc3Ryb2tlPSIjY2JkNWUxIiBzdHJva2Utd2lkdGg9IjIiIGZpbGw9Im5vbmUiPjxwYXRoIGQ9Ik0wIDQwbDQwLTQwTTAgODBMODAgME00MCA4MGw0MC00MCIvPjwvZz48L3N2Zz4=')";

            return (
                <div className="min-h-screen p-4 md:p-8 font-sans">
                    <div className="max-w-5xl mx-auto">
                        
                        {/* Cabeçalho Superior */}
                        <div className="flex flex-col sm:flex-row justify-between items-center mb-6 bg-white dark:bg-slate-800 p-4 sm:p-5 rounded-2xl shadow-sm dark:shadow-md border border-slate-200 dark:border-slate-700 gap-4 transition-colors duration-300">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-indigo-600 rounded-lg flex items-center justify-center shadow-inner">
                                    <Icon name="bar-chart" className="w-6 h-6 text-white" />
                                </div>
                                <div>
                                    <h1 className="text-xl font-bold text-slate-900 dark:text-slate-100 leading-tight">Visualizador de Dados</h1>
                                    <p className="text-xs text-slate-500 dark:text-slate-400">Representação gráfica por ordem de inserção</p>
                                </div>
                            </div>
                            <div className="flex gap-3 w-full sm:w-auto flex-col sm:flex-row">
                                <a 
                                    href="index.html" 
                                    className="bg-white hover:bg-slate-50 dark:bg-slate-700 dark:hover:bg-slate-600 text-slate-700 dark:text-slate-200 text-sm font-medium py-2 px-4 rounded-lg flex items-center gap-2 transition-colors border border-slate-300 dark:border-slate-600 w-full justify-center shadow-sm"
                                >
                                    Otimizador
                                    <Icon name="scissors" className="w-4 h-4" />
                                </a>
                                <a 
                                    href="somador.html" 
                                    className="bg-amber-600 hover:bg-amber-700 text-white text-sm font-medium py-2 px-4 rounded-lg flex items-center gap-2 transition-colors border border-amber-500 w-full justify-center shadow-sm"
                                >
                                    Somador
                                    <Icon name="calculator" className="w-4 h-4" />
                                </a>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            
                            {/* Painel Esquerdo */}
                            <div className="lg:col-span-1 space-y-6">
                                
                                {/* Configuração */}
                                <div className="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 p-5 transition-colors duration-300">
                                    <h2 className="text-lg font-semibold flex items-center gap-2 mb-4 text-slate-900 dark:text-slate-100">
                                        <Icon name="settings-2" className="w-5 h-5 text-slate-400" />
                                        Configuração
                                    </h2>
                                    <div className="space-y-4">
                                        <div>
                                            <label className="block text-sm font-medium text-slate-600 dark:text-slate-400 mb-1 flex items-center gap-1">
                                                <Icon name="file-text" className="w-3.5 h-3.5" />
                                                Nome do Projeto
                                            </label>
                                            <input 
                                                type="text" 
                                                value={planName} 
                                                onChange={(e) => setPlanName(e.target.value)} 
                                                placeholder="Ex: Dados Janeiro" 
                                                className="w-full p-2.5 bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:bg-white dark:focus:bg-slate-900 outline-none text-slate-900 dark:text-slate-100 font-medium transition-colors" 
                                            />
                                        </div>
                                        <div className="pt-2 border-t border-slate-100 dark:border-slate-700">
                                            <label className="block text-sm font-medium text-slate-600 dark:text-slate-400 mb-1">Tamanho da Barra (mm)</label>
                                            <input type="number" value={standardLength} onChange={(e) => { setStandardLength(Number(e.target.value)); setResults(null); }} className="w-full p-2.5 bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:bg-white dark:focus:bg-slate-900 outline-none text-slate-900 dark:text-slate-100 transition-colors" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-slate-600 dark:text-slate-400 mb-1">Espessura Lâmina (mm)</label>
                                            <input type="number" min="0" step="0.1" value={bladeWidth} onChange={(e) => { setBladeWidth(Number(e.target.value)); setResults(null); }} className="w-full p-2.5 bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:bg-white dark:focus:bg-slate-900 outline-none text-slate-900 dark:text-slate-100 transition-colors" />
                                        </div>
                                    </div>
                                </div>

                                {/* Importar Excel */}
                                <div className="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 p-5 transition-colors duration-300">
                                    <h2 className="text-lg font-semibold flex items-center gap-2 mb-4 text-slate-900 dark:text-slate-100">
                                        <Icon name="excel" className="w-5 h-5 text-emerald-500" />
                                        Importar de Excel
                                    </h2>
                                    <div className="space-y-3">
                                        <button 
                                            onClick={downloadTemplate}
                                            className="w-full bg-slate-100 hover:bg-slate-200 dark:bg-slate-700 dark:hover:bg-slate-600 text-slate-700 dark:text-slate-200 text-sm font-medium py-2 px-4 rounded-lg flex items-center justify-center gap-2 transition-colors border border-slate-300 dark:border-slate-600"
                                        >
                                            <Icon name="download" className="w-4 h-4" /> Baixar Planilha Modelo
                                        </button>
                                        
                                        <label className="w-full bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-medium py-2.5 px-4 rounded-lg flex items-center justify-center gap-2 transition-colors cursor-pointer shadow-sm">
                                            <Icon name="upload-cloud" className="w-5 h-5" /> Importar Arquivo (.xlsx)
                                            <input 
                                                type="file" 
                                                accept=".xlsx, .xls" 
                                                className="hidden" 
                                                onChange={handleFileUpload}
                                            />
                                        </label>
                                    </div>
                                </div>

                                {/* Adicionar Peças */}
                                <div className="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 p-5 transition-colors duration-300">
                                    <h2 className="text-lg font-semibold flex items-center gap-2 mb-4 text-slate-900 dark:text-slate-100">
                                        <Icon name="ruler" className="w-5 h-5 text-slate-400" />
                                        Inserir Dados Manuais
                                    </h2>
                                    <form onSubmit={handleAddCut} className="space-y-4">
                                        <div>
                                            <label className="block text-sm font-medium text-slate-600 dark:text-slate-400 mb-1 flex items-center gap-1">
                                                <Icon name="tag" className="w-3 h-3" /> Modelo / Medida
                                            </label>
                                            <select value={currentProfile} onChange={(e) => setCurrentProfile(e.target.value)} className="w-full p-2.5 bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:bg-white dark:focus:bg-slate-900 outline-none text-slate-900 dark:text-slate-100 transition-colors">
                                                {FIXED_PROFILES.map(profile => (
                                                    <option key={profile} value={profile}>{profile}</option>
                                                ))}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-slate-600 dark:text-slate-400 mb-1">Tamanho (mm)</label>
                                            <input type="number" value={currentLength} onChange={(e) => setCurrentLength(e.target.value)} className="w-full p-2.5 bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:bg-white dark:focus:bg-slate-900 outline-none text-slate-900 dark:text-slate-100 transition-colors" />
                                        </div>
                                        {error && <div className="text-red-600 dark:text-red-400 text-sm flex items-center gap-1 bg-red-50 dark:bg-red-900/30 p-2 rounded-md border border-red-200 dark:border-red-800"><Icon name="alert-circle" className="w-4 h-4" />{error}</div>}
                                        <button type="submit" className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 px-4 rounded-lg flex items-center justify-center gap-2 transition-colors shadow-sm">
                                            <Icon name="plus" className="w-5 h-5" /> Inserir
                                        </button>
                                    </form>
                                </div>

                                {/* Lista */}
                                {cutList.length > 0 && (
                                    <div className="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 p-5 flex flex-col h-[300px] transition-colors duration-300">
                                        <div className="flex justify-between items-center mb-4">
                                            <h2 className="text-lg font-semibold text-slate-900 dark:text-slate-100">Lista Registada</h2>
                                            <span className="text-xs font-medium bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 border border-slate-200 dark:border-slate-600 px-2 py-1 rounded-full">{cutList.length} itens</span>
                                        </div>
                                        <div className="flex-1 overflow-y-auto pr-2 space-y-2 custom-scrollbar">
                                            {cutList.map((item, index) => (
                                                <div key={item.id} className="flex items-center justify-between bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 p-3 rounded-lg relative">
                                                    <span className="absolute -left-1 -top-1 bg-indigo-600 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-md shadow-sm">{index + 1}</span>
                                                    <div className="flex flex-col ml-3">
                                                        <div>
                                                            <span className="font-semibold text-slate-800 dark:text-slate-200">{item.length}mm</span>
                                                        </div>
                                                        <span className="text-xs font-medium bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 text-slate-600 dark:text-slate-300 px-2 py-0.5 rounded-md w-fit mt-1">{item.profile}</span>
                                                    </div>
                                                    <button onClick={() => handleRemoveCut(item.id)} className="text-slate-400 hover:text-red-500 transition-colors"><Icon name="trash-2" className="w-4 h-4" /></button>
                                                </div>
                                            ))}
                                        </div>
                                        <div className="pt-4 mt-4 border-t border-slate-100 dark:border-slate-700 flex gap-2">
                                            <button onClick={clearAll} className="flex-1 py-2 px-4 text-sm font-medium text-slate-700 dark:text-slate-300 bg-slate-100 hover:bg-slate-200 dark:bg-slate-700 dark:hover:bg-slate-600 transition-colors rounded-lg">Limpar</button>
                                            <button onClick={generateVisualization} className="flex-[2] py-2 px-4 text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 transition-colors rounded-lg flex justify-center items-center gap-2 shadow-sm"><Icon name="bar-chart" className="w-4 h-4" /> Visualizar</button>
                                        </div>
                                    </div>
                                )}
                            </div>

                            {/* Painel Direito - Resultados */}
                            <div className="lg:col-span-2">
                                {!results ? (
                                    <div className="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 p-8 h-full flex flex-col items-center justify-center text-center space-y-4 min-h-[400px] transition-colors duration-300">
                                        <div className="w-20 h-20 bg-slate-50 dark:bg-slate-900 rounded-full flex items-center justify-center border border-slate-100 dark:border-slate-800"><Icon name="bar-chart" className="w-10 h-10 text-slate-300 dark:text-slate-600" /></div>
                                        <div>
                                            <h3 className="text-lg font-medium text-slate-900 dark:text-slate-100 mb-1">Nenhuma visualização gerada</h3>
                                            <p className="text-slate-500 dark:text-slate-400 text-sm">Insira os dados à esquerda e clique em Visualizar.</p>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="space-y-6">
                                        
                                        {/* Cabeçalho Resultados e Botão Exportar */}
                                        <div className="flex justify-between items-center bg-white dark:bg-slate-800 p-4 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 transition-colors duration-300">
                                            <h2 className="text-xl font-bold text-slate-900 dark:text-slate-100 flex items-center gap-2">
                                                <Icon name="bar-chart" className="w-5 h-5 text-indigo-500" />
                                                {planName || 'Visualização Gráfica'}
                                            </h2>
                                            <button 
                                                onClick={exportToExcelGraphic} 
                                                className="bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2 px-4 rounded-lg flex items-center gap-2 transition-colors shadow-sm"
                                            >
                                                <Icon name="excel" className="w-5 h-5" />
                                                Exportar
                                            </button>
                                        </div>

                                        <div className="grid grid-cols-3 gap-4">
                                            <div className="bg-white dark:bg-slate-800 p-4 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 flex flex-col transition-colors duration-300">
                                                <span className="text-slate-500 dark:text-slate-400 text-sm">Total Barras</span>
                                                <span className="text-3xl font-bold text-slate-900 dark:text-slate-100">{stats.totalBars}</span>
                                            </div>
                                            <div className="bg-white dark:bg-slate-800 p-4 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 flex flex-col transition-colors duration-300">
                                                <span className="text-slate-500 dark:text-slate-400 text-sm">Ocupação (Sem Otim.)</span>
                                                <span className="text-3xl font-bold text-indigo-600 dark:text-indigo-400">{stats.efficiency}%</span>
                                            </div>
                                            <div className="bg-white dark:bg-slate-800 p-4 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 flex flex-col transition-colors duration-300">
                                                <span className="text-slate-500 dark:text-slate-400 text-sm">Sobra Acumulada</span>
                                                <span className="text-3xl font-bold text-rose-600 dark:text-rose-400">{stats.totalWaste}<span className="text-lg">mm</span></span>
                                            </div>
                                        </div>

                                        <div className="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden transition-colors duration-300">
                                            <div className="p-5 space-y-8">
                                                {Object.entries(
                                                    results.reduce((acc, bin) => {
                                                        if (!acc[bin.profile]) acc[bin.profile] = [];
                                                        acc[bin.profile].push(bin);
                                                        return acc;
                                                    }, {})
                                                ).map(([profile, profileBins]) => (
                                                    <div key={profile} className="space-y-3">
                                                        <h3 className="font-bold text-slate-900 dark:text-slate-200 flex items-center gap-2 border-b border-slate-200 dark:border-slate-700 pb-2">
                                                            <Icon name="tag" className="w-4 h-4 text-indigo-500" />
                                                            Modelo: {profile}
                                                            <span className="text-xs font-medium text-slate-600 dark:text-slate-400 bg-slate-100 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 px-2 py-0.5 rounded-full ml-auto">{profileBins.length} barra(s)</span>
                                                        </h3>
                                                        <div className="divide-y divide-slate-200 dark:divide-slate-700 border border-slate-200 dark:border-slate-700 rounded-lg">
                                                            {profileBins.map((bin, index) => (
                                                                <div key={index} className="p-4 hover:bg-slate-50 dark:hover:bg-slate-700/30 transition-colors">
                                                                    <div className="flex justify-between items-end mb-3">
                                                                        <h4 className="font-semibold text-slate-900 dark:text-slate-200">Barra #{bin.id}</h4>
                                                                        <span className="text-sm text-slate-500 dark:text-slate-400">Sobra Final: <span className="text-rose-600 dark:text-rose-400 font-medium">{bin.remaining.toFixed(1)}mm</span></span>
                                                                    </div>
                                                                    
                                                                    {/* Representação visual da barra */}
                                                                    <div className="h-10 w-full bg-slate-100 dark:bg-slate-900 rounded-md flex relative mb-3 border border-slate-300 dark:border-slate-700 overflow-hidden shadow-inner">
                                                                        {bin.cuts.map((cut, cutIdx) => {
                                                                            const percentage = (cut / standardLength) * 100;
                                                                            const colors = ['bg-indigo-600', 'bg-violet-600', 'bg-fuchsia-600', 'bg-purple-600'];
                                                                            return (
                                                                                <div key={cutIdx} style={{ width: `${percentage}%` }} className={`h-full ${colors[cutIdx % colors.length]} border-r border-white/30 dark:border-slate-800 flex items-center justify-center text-xs text-white px-1 overflow-hidden font-medium`}>
                                                                                    {percentage > 5 ? cut : ''}
                                                                                </div>
                                                                            );
                                                                        })}
                                                                        <div className="h-full opacity-50 flex-1" style={{ backgroundImage: wasteBgUrl }}></div>
                                                                    </div>
                                                                    
                                                                    <div className="flex flex-wrap gap-2 text-sm mt-3">
                                                                        <span className="text-slate-500 dark:text-slate-400 font-medium">Dados (Sequência):</span>
                                                                        {bin.cuts.map((cut, cutIdx) => (
                                                                            <span key={cutIdx} className="bg-white dark:bg-slate-900 px-2 py-0.5 rounded border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-300 shadow-sm font-medium">{cut}mm</span>
                                                                        ))}
                                                                    </div>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* --- BOTÃO DE MUDAR TEMA --- */}
                        <div className="mt-12 mb-4 flex justify-center border-t border-slate-200 dark:border-slate-700 pt-8">
                            <button
                                onClick={() => setIsDark(!isDark)}
                                className="flex items-center gap-2 px-5 py-2.5 rounded-full bg-slate-200 dark:bg-slate-800 text-slate-700 dark:text-slate-300 hover:bg-slate-300 dark:hover:bg-slate-700 transition-colors shadow-sm font-medium"
                            >
                                {isDark ? <Icon name="sun" className="w-5 h-5" /> : <Icon name="moon" className="w-5 h-5" />}
                                {isDark ? 'Mudar para Tema Claro' : 'Mudar para Tema Escuro'}
                            </button>
                        </div>

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
